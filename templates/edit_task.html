{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto p-6">

    <div class="bg-white rounded-xl shadow border p-6">

        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold">Edit Task</h1>
                <p class="text-gray-500 text-sm">Update assigned task details</p>
            </div>

            <a href="/admin/tasks"
               class="px-4 py-2 border rounded-lg text-gray-600 hover:text-blue-600 hover:border-blue-600 transition">
               Back
            </a>
        </div>

        <form method="POST" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Sales Person
                </label>

                <select name="sales_id"
                        required
                        class="w-full border rounded-lg px-4 py-3">

                    {% for u in sales_users %}
                        <option value="{{ u.id }}"
                            {% if u.id == task.sales_id %}selected{% endif %}>
                            {{ u.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Task Title
                </label>

                <input type="text"
                       name="task_title"
                       value="{{ task.task_title }}"
                       required
                       class="w-full border rounded-lg px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Description
                </label>

                <textarea name="task_description"
                          rows="4"
                          required
                          class="w-full border rounded-lg px-4 py-3">{{ task.task_description }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Task Date
                </label>

                <input type="date"
                       name="task_date"
                       value="{{ task.task_date }}"
                       required
                       class="w-full border rounded-lg px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Priority
                </label>

                <select name="priority"
                        required
                        class="w-full border rounded-lg px-4 py-3">

                    <option value="low"
                        {% if task.priority == 'low' %}selected{% endif %}>
                        Low
                    </option>

                    <option value="medium"
                        {% if task.priority == 'medium' %}selected{% endif %}>
                        Medium
                    </option>

                    <option value="high"
                        {% if task.priority == 'high' %}selected{% endif %}>
                        High
                    </option>

                </select>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">

                Update Task

            </button>

        </form>

    </div>

</div>

{% endblock %}
