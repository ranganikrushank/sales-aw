{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --sl-primary: #2563eb;
    --sl-primary-hover: #1d4ed8;
    --sl-bg: #f8fafc;
    --sl-card: #ffffff;
    --sl-text: #0f172a;
    --sl-text-muted: #64748b;
    --sl-border: #e2e8f0;
    --sl-focus: #3b82f6;
    --sl-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    --sl-radius: 0.75rem;
    --sl-transition: all 0.2s ease;
  }

  .sl-login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
    padding: 1.5rem;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  .sl-card {
    width: 100%;
    max-width: 420px;
    background: var(--sl-card);
    border-radius: var(--sl-radius);
    box-shadow: var(--sl-shadow);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .sl-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--sl-primary), #60a5fa);
  }

  .sl-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .sl-header h1 {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--sl-text);
    letter-spacing: -0.025em;
  }

  .sl-header p {
    margin: 0.5rem 0 0;
    color: var(--sl-text-muted);
    font-size: 0.875rem;
  }

  .sl-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .sl-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .sl-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--sl-text);
  }

  .sl-input-wrapper {
    position: relative;
  }

  .sl-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--sl-border);
    border-radius: 0.5rem;
    background: #fff;
    color: var(--sl-text);
    font-size: 0.9375rem;
    transition: var(--sl-transition);
    box-sizing: border-box;
  }

  .sl-input:focus {
    outline: none;
    border-color: var(--sl-focus);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  .sl-password-toggle {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sl-text-muted);
    padding: 0.25rem;
    transition: var(--sl-transition);
  }

  .sl-password-toggle:hover { color: var(--sl-text); }

  .sl-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.875rem;
  }

  .sl-checkbox {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--sl-text-muted);
    cursor: pointer;
  }

  .sl-checkbox input {
    width: 1rem; height: 1rem;
    accent-color: var(--sl-primary);
  }

  .sl-link {
    color: var(--sl-primary);
    text-decoration: none;
    font-weight: 500;
    transition: var(--sl-transition);
  }

  .sl-link:hover { text-decoration: underline; color: var(--sl-primary-hover); }

  .sl-btn {
    margin-top: 0.5rem;
    padding: 0.75rem;
    background: var(--sl-primary);
    color: #fff;
    border: none;
    border-radius: 0.5rem;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--sl-transition);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .sl-btn:hover {
    background: var(--sl-primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 6px -1px rgba(37,99,235,0.25);
  }

  .sl-btn:active { transform: translateY(0); }

  .sl-footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.875rem;
    color: var(--sl-text-muted);
  }

  @media (max-width: 480px) {
    .sl-card { padding: 1.5rem; }
    .sl-options { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  }
</style>

<div class="sl-login-wrapper">
  <div class="sl-card">
    <div class="sl-header">
      <h1>Sales Admin Login</h1>
      <p>Access your dashboard securely</p>
    </div>

    <form class="sl-form" action="#" method="POST">
      <div class="sl-group">
        <label class="sl-label" for="username">Username</label>

        <input
            type="text"
            id="username"
            name="username"
            class="sl-input"
            placeholder="Enter username"
            autocomplete="username"
            required
        >
      </div>

      <div class="sl-group">
        <label class="sl-label" for="password">Password</label>
        <div class="sl-input-wrapper">
          <input
              type="password"
              id="password"
              name="password"
              class="sl-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
          >
          <button type="button" class="sl-password-toggle" aria-label="Toggle password visibility" onclick="togglePassword()">
            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="sl-options">
        <label class="sl-checkbox">
          <input type="checkbox" id="remember"> Remember me
        </label>
      </div>

      <button type="submit" class="sl-btn">Sign In</button>
    </form>

    <div class="sl-footer">
      Switch to <a href="/sales/login" class="sl-link">Sales Portal</a> or <a href="/admin/login" class="sl-link">Admin Panel</a>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
      pwd.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
  }
</script>
{% endblock %}
