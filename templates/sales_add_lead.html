{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --al-bg: #f8fafc;
    --al-card: #ffffff;
    --al-primary: #2563eb;
    --al-primary-light: #eff6ff;
    --al-text: #0f172a;
    --al-text-muted: #64748b;
    --al-border: #e2e8f0;
    --al-focus: #3b82f6;
    --al-success: #10b981;
    --al-radius: 14px;
    --al-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    --al-transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .al-wrapper {
    background: var(--al-bg);
    min-height: 100vh;
    padding: 2rem;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--al-text);
    box-sizing: border-box;
  }

  .al-header { margin-bottom: 2rem; }
  .al-header h1 { margin: 0.5rem 0 0.25rem; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em; }
  .al-header .subtitle { margin: 0; color: var(--al-text-muted); font-size: 0.95rem; }

  .al-back-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1rem;
    background: var(--al-card);
    border: 1px solid var(--al-border);
    border-radius: 999px;
    color: var(--al-text);
    text-decoration: none;
    font-weight: 600; font-size: 0.875rem;
    transition: var(--al-transition);
  }
  .al-back-btn:hover { background: #f1f5f9; border-color: #cbd5e1; transform: translateX(-2px); }

  .al-card {
    background: var(--al-card);
    border-radius: var(--al-radius);
    box-shadow: var(--al-shadow);
    border: 1px solid var(--al-border);
    padding: 2rem;
    max-width: 720px;
    margin: 0 auto;
  }

  .al-form { display: flex; flex-direction: column; gap: 1.5rem; }

  .al-field { display: flex; flex-direction: column; gap: 0.5rem; }
  .al-label { font-size: 0.875rem; font-weight: 600; color: var(--al-text); }
  .al-hint { font-size: 0.75rem; color: var(--al-text-muted); margin-top: 0.25rem; }

  .al-input, .al-select, .al-textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    border: 1px solid var(--al-border);
    border-radius: 10px;
    background: #fff;
    color: var(--al-text);
    font-size: 0.9375rem;
    transition: var(--al-transition);
    box-sizing: border-box;
  }
  .al-input:focus, .al-select:focus, .al-textarea:focus {
    outline: none;
    border-color: var(--al-focus);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .al-textarea { min-height: 100px; resize: vertical; }

  /* Pill Selector Groups */
  .al-pill-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .al-pill {
    padding: 0.5rem 1rem;
    border: 1px solid var(--al-border);
    border-radius: 999px;
    background: #fff;
    color: var(--al-text-muted);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--al-transition);
    user-select: none;
  }
  .al-pill:hover { border-color: var(--al-primary); color: var(--al-primary); }
  .al-pill input { display: none; }
  .al-pill:has(input:checked) {
    background: var(--al-primary);
    border-color: var(--al-primary);
    color: #fff;
    box-shadow: 0 2px 4px rgba(37,99,235,0.2);
  }

  /* Multi-select Tag Visualization */
  .al-multiselect {
    border: 1px solid var(--al-border);
    border-radius: 10px;
    padding: 0.75rem;
    background: #fff;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .al-multiselect select {
    border: none;
    padding: 0.5rem;
    font-size: 0.9rem;
    background: #f8fafc;
    border-radius: 6px;
    cursor: pointer;
  }
  .al-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
  .al-tag {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.3rem 0.6rem;
    background: var(--al-primary-light);
    color: var(--al-primary);
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .al-tag button {
    background: none; border: none; color: var(--al-primary);
    cursor: pointer; padding: 0; font-size: 1rem; line-height: 1;
    opacity: 0.7; transition: opacity 0.15s;
  }
  .al-tag button:hover { opacity: 1; }

  .al-submit {
    margin-top: 0.5rem;
    padding: 0.875rem 1.5rem;
    background: var(--al-primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--al-transition);
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    width: 100%;
  }
  .al-submit:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 8px 16px -4px rgba(37,99,235,0.3);
  }
  .al-submit:active { transform: translateY(0); }

  .al-footer { text-align: center; margin-top: 1.5rem; color: var(--al-text-muted); font-size: 0.875rem; }

  @media (max-width: 640px) {
    .al-wrapper { padding: 1rem; }
    .al-card { padding: 1.5rem; }
    .al-pill-group { justify-content: center; }
  }
</style>

<div class="al-wrapper">
  <header class="al-header">
    <a href="/sales/dashboard" class="al-back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Dashboard
    </a>
    <h1>Add New Lead</h1>
    <p class="subtitle">Capture prospect details and schedule follow-ups</p>
  </header>

  <div class="al-card">
    <form class="al-form" action="{{ url_for('sales_add_lead') }}" method="POST">
      <!-- Company Name -->
      <div class="al-field">
        <label class="al-label" for="company_name">Company Name *</label>
        <input type="text" id="company_name" name="company_name" class="al-input" placeholder="Acme Corporation" required>
      </div>

      <!-- Contact Info -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="al-field">
          <label class="al-label" for="email">Email *</label>
          <input type="email" id="email" name="email" class="al-input" placeholder="contact@acme.com" required>
        </div>
        <div class="al-field">
          <label class="al-label" for="phone">Phone *</label>
          <input type="tel" id="phone" name="phone" class="al-input" placeholder="+1 (555) 123-4567" required>
        </div>
        <div class="al-field">
            <label class="al-label" for="country">Country *</label>

            <input 
                type="text"
                id="country"
                name="country"
                class="al-input"
                placeholder="India"
                required
            >
        </div>
       <div class="al-field">
          <label class="al-label" for="city">City *</label>
          <input 
              type="text"
              id="city"
              name="city"
              class="al-input"
              placeholder="Bangalore"
              required
          >
      </div>

      <!-- Platform of Finding -->
      <div class="al-field">
        <label class="al-label">Platform of Finding *</label>
        <div class="al-pill-group">
          <label class="al-pill">
            <input type="radio" name="platform" value="LinkedIn" required> LinkedIn
          </label>
          <label class="al-pill">
            <input type="radio" name="platform" value="Referral"> Referral
          </label>
          <label class="al-pill">
            <input type="radio" name="platform" value="Cold Call"> Cold Call
          </label>
          <label class="al-pill">
            <input type="radio" name="platform" value="Website"> Website
          </label>
        </div>
      </div>

      <!-- Business Sector -->
      <div class="al-field">
        <label class="al-label">Business Sector *</label>
        <div class="al-pill-group">
          <label class="al-pill">
            <input type="radio" name="sector" value="Tech" required> Tech
          </label>
          <label class="al-pill">
            <input type="radio" name="sector" value="Healthcare"> Healthcare
          </label>
          <label class="al-pill">
            <input type="radio" name="sector" value="Retail"> Retail
          </label>
          <label class="al-pill">
            <input type="radio" name="sector" value="Finance"> Finance
          </label>
        </div>
      </div>

      <!-- Services Needed (Multi-select) -->
      <div class="al-field">
        <label class="al-label">Services Needed *</label>
        <div class="al-multiselect">
          <select id="services" name="services" class="al-select" multiple size="4">
            <option value="Website Development">Website Development</option>
            <option value="Custom Software Development">Custom Software Development</option>
            <option value="App Development">App Development</option>
            <option value="AI Software & AI Agents">AI Software & AI Agents</option>
            <option value="E Commerce Website">E Commerce Website</option>
            <option value="WhatsApp Automation">WhatsApp Automation</option>
          </select>
          <span class="al-hint">Hold Ctrl/Cmd to select multiple</span>
          <div class="al-tags" id="selected-tags"></div>
        </div>
      </div>

      <!-- Follow-up Date -->
      <div class="al-field">
        <label class="al-label" for="follow_up_date">Follow-up Date</label>
        <input type="date" id="follow_up_date" name="follow_up_date" class="al-input">
        <span class="al-hint">Optional: Schedule a reminder for follow-up</span>
      </div>

      <!-- Notes -->
      <div class="al-field">
        <label class="al-label" for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" class="al-textarea" placeholder="Any context, requirements, or special instructions..."></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="al-submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Save Lead
      </button>
    </form>
  </div>

  <div class="al-footer">
    All fields marked with * are required. Data is saved securely.
  </div>
</div>

<script>
  // Tag visualization for multi-select
  document.addEventListener('DOMContentLoaded', () => {
    const select = document.getElementById('services');
    const tagsContainer = document.getElementById('selected-tags');
    
    function updateTags() {
      tagsContainer.innerHTML = '';
      Array.from(select.selectedOptions).forEach(opt => {
        const tag = document.createElement('span');
        tag.className = 'al-tag';
        tag.innerHTML = `₹{opt.value} <button type="button" aria-label="Remove ₹{opt.value}">&times;</button>`;
        tag.querySelector('button').onclick = (e) => {
          e.preventDefault();
          opt.selected = false;
          updateTags();
        };
        tagsContainer.appendChild(tag);
      });
    }
    
    select.addEventListener('change', updateTags);
    updateTags(); // Initial render
  });
</script>
{% endblock %}
